AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: African Language Assistant - Serverless Infrastructure

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        SESSIONS_TABLE: !Ref SessionsTable
        CACHE_TABLE: !Ref ResponseCacheTable
        AUDIO_BUCKET: !Ref AudioBucket
        AWS_REGION: !Ref AWS::Region
        BEDROCK_ENDPOINT: !Sub https://bedrock-runtime.${AWS::Region}.amazonaws.com
        BEDROCK_GUARDRAIL_ID: !GetAtt BedrockGuardrail.GuardrailId
        BEDROCK_GUARDRAIL_VERSION: !GetAtt BedrockGuardrailVersion.Version
        POLLY_ENDPOINT: !Sub https://polly.${AWS::Region}.amazonaws.com
        TRANSCRIBE_ENDPOINT: !Sub https://transcribe.${AWS::Region}.amazonaws.com
        DYNAMODB_ENDPOINT: !Sub https://dynamodb.${AWS::Region}.amazonaws.com
        S3_ENDPOINT: !Sub https://s3.${AWS::Region}.amazonaws.com

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name

Resources:
  # API Gateway
  LanguageAssistantApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub african-language-assistant-${Environment}
      StageName: !Ref Environment
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: !Sub language-assistant-usage-plan-${Environment}
          Quota:
            Limit: 10000
            Period: MONTH
          Throttle:
            RateLimit: 10
            BurstLimit: 20
      Cors:
        AllowMethods: "'POST, GET, OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        AllowCredentials: false
        MaxAge: "'600'"
      GatewayResponses:
        THROTTLED:
          StatusCode: 429
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
          ResponseTemplates:
            application/json: '{"error": true, "errorCode": "RATE_LIMIT_EXCEEDED", "message": "Too many requests. Please try again later.", "fallbackMessage": "Too many requests. Please try again later.", "retryable": true}'
        UNAUTHORIZED:
          StatusCode: 401
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
          ResponseTemplates:
            application/json: '{"error": true, "errorCode": "UNAUTHORIZED", "message": "Invalid or missing API key.", "fallbackMessage": "Invalid or missing API key.", "retryable": false}'
        BAD_REQUEST_BODY:
          StatusCode: 400
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
          ResponseTemplates:
            application/json: '{"error": true, "errorCode": "INVALID_REQUEST", "message": "Invalid request body.", "fallbackMessage": "Invalid request body.", "retryable": false}'
      Models:
        TextInputModel:
          type: object
          required:
            - userId
            - sessionId
            - message
          properties:
            userId:
              type: string
              minLength: 1
              maxLength: 128
            sessionId:
              type: string
              minLength: 1
              maxLength: 128
            message:
              type: string
              minLength: 1
              maxLength: 999
            preferredLanguage:
              type: string
              enum: [ha, yo, ig, ff, en]
        AudioInputModel:
          type: object
          required:
            - userId
            - sessionId
            - audioData
            - audioFormat
          properties:
            userId:
              type: string
              minLength: 1
              maxLength: 128
            sessionId:
              type: string
              minLength: 1
              maxLength: 128
            audioData:
              type: string
            audioFormat:
              type: string
              enum: [wav, mp3, m4a]

  # Lambda Functions
  InputHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub language-assistant-input-handler-${Environment}
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      CodeUri: target/language-assistant-1.0.0-aws.jar
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          SPRING_CLOUD_FUNCTION_DEFINITION: inputHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ResponseCacheTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
      Events:
        TextInput:
          Type: Api
          Properties:
            RestApiId: !Ref LanguageAssistantApi
            Path: /query
            Method: POST
            RequestModel:
              Model: TextInputModel
              Required: true
              ValidateBody: true
      LoggingConfig:
        LogGroup: !Ref InputHandlerLogGroup

  AudioHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub language-assistant-audio-handler-${Environment}
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      CodeUri: target/language-assistant-1.0.0-aws.jar
      MemorySize: 512
      Timeout: 30
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          SPRING_CLOUD_FUNCTION_DEFINITION: audioHandlerFunction
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref AudioBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ResponseCacheTable
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
              Resource: '*'
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
              Resource: '*'
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
      Events:
        AudioInput:
          Type: Api
          Properties:
            RestApiId: !Ref LanguageAssistantApi
            Path: /audio
            Method: POST
            RequestModel:
              Model: AudioInputModel
              Required: true
              ValidateBody: true
      LoggingConfig:
        LogGroup: !Ref AudioHandlerLogGroup

  TranscriptionProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub language-assistant-transcription-processor-${Environment}
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      CodeUri: target/language-assistant-1.0.0-aws.jar
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          SPRING_CLOUD_FUNCTION_DEFINITION: transcriptionProcessor
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref AudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:GetTranscriptionJob
              Resource: '*'
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref AudioBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .json
      LoggingConfig:
        LogGroup: !Ref TranscriptionProcessorLogGroup

  TextToSpeechFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub language-assistant-tts-${Environment}
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      CodeUri: target/language-assistant-1.0.0-aws.jar
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          SPRING_CLOUD_FUNCTION_DEFINITION: textToSpeech
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref AudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
              Resource: '*'
      LoggingConfig:
        LogGroup: !Ref TTSLogGroup

  # DynamoDB Tables
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub language-assistant-sessions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  ResponseCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub language-assistant-cache-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: queryHash
          AttributeType: S
        - AttributeName: language
          AttributeType: S
      KeySchema:
        - AttributeName: queryHash
          KeyType: HASH
        - AttributeName: language
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  # S3 Bucket
  AudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub language-assistant-audio-${Environment}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAfter1Day
            Status: Enabled
            ExpirationInDays: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - '*'
            MaxAge: 3000

  # Bedrock Guardrail
  BedrockGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub language-assistant-guardrail-${Environment}
      Description: Content filtering guardrail for African Language Assistant
      BlockedInputMessaging: "I cannot process this request as it contains inappropriate content. Please rephrase your question."
      BlockedOutputsMessaging: "I cannot provide a response to this request. Please ask a different question about public services."
      ContentPolicyConfig:
        FiltersConfig:
          - Type: SEXUAL
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: VIOLENCE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: MEDIUM
            OutputStrength: MEDIUM
          - Type: MISCONDUCT
            InputStrength: MEDIUM
            OutputStrength: MEDIUM
          - Type: PROMPT_ATTACK
            InputStrength: HIGH
            OutputStrength: NONE
      TopicPolicyConfig:
        TopicsConfig:
          - Name: MedicalDiagnosis
            Definition: "Medical diagnosis, treatment recommendations, or prescription advice"
            Examples:
              - "What medicine should I take for this illness?"
              - "Do I have cancer based on these symptoms?"
            Type: DENY
          - Name: LegalAdvice
            Definition: "Specific legal advice or representation"
            Examples:
              - "Should I sue this person?"
              - "What's the best way to avoid taxes?"
            Type: DENY
      WordPolicyConfig:
        WordsConfig:
          - Text: "password"
          - Text: "credit card"
          - Text: "social security"
        ManagedWordListsConfig:
          - Type: PROFANITY

  BedrockGuardrailVersion:
    Type: AWS::Bedrock::GuardrailVersion
    Properties:
      GuardrailIdentifier: !GetAtt BedrockGuardrail.GuardrailId
      Description: !Sub Version for ${Environment} environment

  # CloudWatch Log Groups
  InputHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/language-assistant-input-handler-${Environment}
      RetentionInDays: 7

  # API Key for testing
  LanguageAssistantApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
      - LanguageAssistantApiStage
    Properties:
      Name: !Sub language-assistant-api-key-${Environment}
      Description: API Key for African Language Assistant
      Enabled: true
      StageKeys:
        - RestApiId: !Ref LanguageAssistantApi
          StageName: !Ref Environment

  LanguageAssistantApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: !Ref Environment
      RestApiId: !Ref LanguageAssistantApi
      DeploymentId: !Ref LanguageAssistantApiDeployment

  LanguageAssistantApiDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref LanguageAssistantApi

  LanguageAssistantUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    DependsOn:
      - LanguageAssistantApiKey
    Properties:
      KeyId: !Ref LanguageAssistantApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref LanguageAssistantApi.UsagePlan

  AudioHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/language-assistant-audio-handler-${Environment}
      RetentionInDays: 7

  TranscriptionProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/language-assistant-transcription-processor-${Environment}
      RetentionInDays: 7

  TTSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/language-assistant-tts-${Environment}
      RetentionInDays: 7

  # CloudWatch Alarms
  ErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub language-assistant-error-rate-${Environment}
      AlarmDescription: Triggers when error rate exceeds 5%
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  LatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub language-assistant-latency-${Environment}
      AlarmDescription: Triggers when p95 latency exceeds 3 seconds
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${LanguageAssistantApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint

  ApiKeyId:
    Description: API Key ID for authentication
    Value: !Ref LanguageAssistantApiKey
    Export:
      Name: !Sub ${AWS::StackName}-ApiKeyId

  SessionsTableName:
    Description: DynamoDB Sessions table name
    Value: !Ref SessionsTable
    Export:
      Name: !Sub ${AWS::StackName}-SessionsTable

  CacheTableName:
    Description: DynamoDB Cache table name
    Value: !Ref ResponseCacheTable
    Export:
      Name: !Sub ${AWS::StackName}-CacheTable

  AudioBucketName:
    Description: S3 Audio bucket name
    Value: !Ref AudioBucket
    Export:
      Name: !Sub ${AWS::StackName}-AudioBucket

  BedrockGuardrailId:
    Description: Bedrock Guardrail ID for content filtering
    Value: !GetAtt BedrockGuardrail.GuardrailId
    Export:
      Name: !Sub ${AWS::StackName}-GuardrailId

  BedrockGuardrailVersion:
    Description: Bedrock Guardrail Version
    Value: !GetAtt BedrockGuardrailVersion.Version
    Export:
      Name: !Sub ${AWS::StackName}-GuardrailVersion
